project:
  type: website
  output-dir: docs
  post-render: scripts/postprocess-feed.sh
  render:
    - "*.qmd"
    - "**/*.qmd"
  resources:
    - dashboard.html
    - metrics.jsonl
    - posts/introducing-qrec/static/context-handoff.webm
    - posts/introducing-qrec/static/model-download.webm

website:
  title: "DvQ"
  draft-mode: unlinked
  site-url: https://dvquys.com
  description: "DvQ Personal Website"
  navbar:
    right:
      - text: "About"
        href: about.qmd
      - text: "Blog"
        href: index.qmd
      - text: "Newsletter"
        href: subscribe.qmd
      - icon: linkedin
        text: "LinkedIn"
        href: https://www.linkedin.com/in/dvquy/
      - icon: github
        text: "GitHub"
        href: https://github.com/dvquy13
      - icon: twitter-x
        text: "X"
        href: https://x.com/dvquys
      - icon: rss
        text: "RSS"
        href: index.xml
  favicon: avatar.png
  google-analytics: "G-NH6GYY9FZV"
  cookie-consent:
    type: implied

format:
  html:
    theme:
      - united
      - custom.scss
    code-fold: true
    css: styles.css
    mainfont: "DM Sans, InterVariable, sans-serif"
    highlight-style: github
    fontsize: 15px
    linestretch: 1.7
    linkcolor: "#0057a3"
    smooth-scroll: true
    monofont: "Google Sans Code, Roboto Mono"
    grid:
      # Chosen so that we have maximum 75 characters in the text body for readability
      body-width: 550px
    header-includes: |
      <!-- Inter (fallback) -->
      <link rel="preconnect" href="https://rsms.me/">
      <link rel="stylesheet" href="https://rsms.me/inter/inter.css">
      <!-- Figtree + DM Sans -->
      <link rel="preconnect" href="https://fonts.googleapis.com">
      <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
      <link href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300..900;1,300..900&family=Google+Sans+Code:wght@400;700&family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Roboto+Mono:ital,wght@0,100..700;1,100..700&display=swap" rel="stylesheet">
    anchor-sections: true
    link-external-newwindow: true

toc: true
number-sections: false

resource:
  - CNAME
