project:
  type: website
  output-dir: docs
  post-render: scripts/postprocess-feed.sh
  render:
    - "*.qmd"
    - "**/*.qmd"
  resources:
    - dashboard.html
    - metrics.jsonl

website:
  title: "DvQ"
  draft-mode: unlinked
  site-url: https://dvquys.com
  description: "DvQ Personal Website"
  navbar:
    right:
      - text: "About"
        href: about.qmd
      - text: "Blog"
        href: index.qmd
      - text: "Newsletter"
        href: subscribe.qmd
      - icon: linkedin
        text: "LinkedIn"
        href: https://www.linkedin.com/in/dvquy/
      - icon: github
        text: "GitHub"
        href: https://github.com/dvquy13
      - icon: twitter-x
        text: "X"
        href: https://x.com/dvquys
      - icon: rss
        text: "RSS"
        href: index.xml
  favicon: avatar.png

format:
  html:
    theme:
      - united
      - custom.scss
    code-fold: true
    css: styles.css
    mainfont: "DM Sans, InterVariable, sans-serif"
    highlight-style: github
    fontsize: 15px
    linestretch: 1.7
    linkcolor: "#0057a3"
    smooth-scroll: true
    monofont: "Google Sans Code, Roboto Mono"
    grid:
      # Chosen so that we have maximum 75 characters in the text body for readability
      body-width: 550px
    header-includes: |
      <script async src="https://www.googletagmanager.com/gtag/js?id=G-NH6GYY9FZV"></script>
      <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('consent', 'default', {
        'analytics_storage': 'granted',
        'ad_storage': 'granted',
        'ad_user_data': 'granted',
        'ad_personalization': 'granted'
      });
      gtag('js', new Date());
      // Manually extract UTM params from URL and pass to config
      // to bypass any auto-extraction issues
      (function() {
        var p = new URLSearchParams(window.location.search);
        var cfg = {'anonymize_ip': true, 'debug_mode': true};
        if (p.get('utm_source')) cfg.campaign_source = p.get('utm_source');
        if (p.get('utm_medium')) cfg.campaign_medium = p.get('utm_medium');
        if (p.get('utm_campaign')) cfg.campaign = p.get('utm_campaign');
        if (p.get('utm_term')) cfg.campaign_term = p.get('utm_term');
        if (p.get('utm_content')) cfg.campaign_content = p.get('utm_content');
        gtag('config', 'G-NH6GYY9FZV', cfg);
      })();
      </script>
      <!-- Inter (fallback) -->
      <link rel="preconnect" href="https://rsms.me/">
      <link rel="stylesheet" href="https://rsms.me/inter/inter.css">
      <!-- Google Sans Flex + DM Sans -->
      <link rel="preconnect" href="https://fonts.googleapis.com">
      <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
      <link href="https://fonts.googleapis.com/css2?family=Google+Sans+Flex:wdth,wght@75..125,100..700&family=Google+Sans+Code:wght@400;700&family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Roboto+Mono:ital,wght@0,100..700;1,100..700&display=swap" rel="stylesheet">
    anchor-sections: true
    link-external-newwindow: true

toc: true
number-sections: false

resource:
  - CNAME
