on:
  schedule:
    - cron: '0 1 * * *'   # 01:00 UTC daily (08:00 GMT+7)
  workflow_dispatch:

name: Fetch Metrics & Update Dashboard

jobs:
  fetch-and-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Write GA4 service account credentials
        run: |
          mkdir -p analytics/credentials
          echo '${{ secrets.GA4_SERVICE_ACCOUNT_JSON }}' > analytics/credentials/ga4-service-account.json

      - name: Fetch GA4 metrics
        run: cd analytics && uv run scripts/fetch-metrics.py > /tmp/ga4-metrics.json

      - name: Fetch Giscus reactions
        run: cd analytics && uv run scripts/fetch-giscus-reactions.py > /tmp/giscus-metrics.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge metrics and append to history
        run: |
          python3 -c "
          import json
          ga4 = json.load(open('/tmp/ga4-metrics.json'))
          giscus = json.load(open('/tmp/giscus-metrics.json'))
          merged = {**ga4, 'metrics': {**ga4['metrics'], **giscus['metrics']}}
          print(json.dumps(merged))
          " > /tmp/merged-metrics.json
          cd analytics && METRICS_JSONL=../metrics.jsonl uv run scripts/push-and-notify.py < /tmp/merged-metrics.json
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Commit metrics.jsonl if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add metrics.jsonl
          git diff --staged --quiet && echo "No changes." || \
            (git commit -m "chore: update metrics history" && git push)
