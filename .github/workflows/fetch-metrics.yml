on:
  schedule:
    - cron: '13 20 * * *'  # 20:13 UTC daily (03:13 GMT+7 next day), early so even GH Actions delays land before wake-up
  workflow_dispatch:

name: Fetch Metrics & Update Dashboard

jobs:
  fetch-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Write GA4 service account credentials
        run: |
          mkdir -p analytics/credentials
          echo '${{ secrets.GA4_SERVICE_ACCOUNT_JSON }}' > analytics/credentials/ga4-service-account.json

      - name: Write Google ADC credentials
        run: |
          mkdir -p ~/.config/gcloud
          echo '${{ secrets.GOOGLE_ADC_CREDENTIALS }}' > ~/.config/gcloud/application_default_credentials.json

      - name: Fetch GA4 metrics
        run: cd analytics && uv run scripts/fetch-metrics.py > /tmp/ga4-metrics.json

      - name: Fetch Giscus reactions
        run: cd analytics && uv run scripts/fetch-giscus-reactions.py > /tmp/giscus-metrics.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch Giscus comments
        run: cd analytics && uv run scripts/fetch-giscus-comments.py > /tmp/giscus-comments-metrics.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch posts published (last 28d)
        run: cd analytics && uv run scripts/fetch-posts-published.py > /tmp/posts-metrics.json

      - name: Fetch GA4 top sources
        run: cd analytics && uv run scripts/fetch-ga4-top-sources.py > /tmp/ga4-sources.json

      - name: Fetch newsletter subscribers
        run: cd analytics && uv run scripts/fetch-newsletter-subscribers.py > /tmp/newsletter-metrics.json
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Merge metrics and push to Supabase
        run: |
          python3 -c "
          import json
          ga4 = json.load(open('/tmp/ga4-metrics.json'))
          giscus = json.load(open('/tmp/giscus-metrics.json'))
          giscus_comments = json.load(open('/tmp/giscus-comments-metrics.json'))
          posts = json.load(open('/tmp/posts-metrics.json'))
          sources = json.load(open('/tmp/ga4-sources.json'))
          newsletter = json.load(open('/tmp/newsletter-metrics.json'))
          merged = {**ga4, 'metrics': {**ga4['metrics'], **giscus['metrics'], **giscus_comments['metrics'], **posts['metrics'], **sources['metrics'], **newsletter['metrics']}}
          print(json.dumps(merged))
          " > /tmp/merged-metrics.json
          cd analytics && uv run scripts/push-and-notify.py < /tmp/merged-metrics.json
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}

      - name: Stamp dashboard with metrics snapshot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Stamp main branch copy (kept in sync for local `make analytics-push`)
          python3 analytics/scripts/stamp-dashboard.py \
            --snapshot /tmp/merged-metrics.json \
            --dashboard dashboard.html
          git add dashboard.html
          git diff --cached --quiet || git commit -m "chore: stamp dashboard with latest metrics snapshot"
          git push

          # GITHUB_TOKEN pushes don't trigger publish.yml (GitHub loop prevention),
          # so gh-pages never gets the stamped file via the normal Quarto deploy.
          # Patch gh-pages directly using a worktree.
          git fetch origin gh-pages
          git worktree add /tmp/gh-pages origin/gh-pages
          python3 analytics/scripts/stamp-dashboard.py \
            --snapshot /tmp/merged-metrics.json \
            --dashboard /tmp/gh-pages/dashboard.html
          cd /tmp/gh-pages
          git add dashboard.html
          git diff --cached --quiet || git commit -m "chore: stamp dashboard with latest metrics snapshot"
          git push origin HEAD:gh-pages
