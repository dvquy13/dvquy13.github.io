<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>dvquys.com — Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300..700;1,9..40,300..700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "DM Sans", sans-serif;
      background: #f9f9f7;
      color: #1a1a1a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 64px 24px 48px;
    }

    header {
      text-align: center;
      margin-bottom: 52px;
    }

    header a {
      font-size: 13px;
      font-weight: 500;
      color: #0057a3;
      text-decoration: none;
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }
    header a:hover { text-decoration: underline; }

    h1 {
      font-size: 26px;
      font-weight: 600;
      margin-top: 10px;
      letter-spacing: -0.02em;
    }

    .subtitle {
      font-size: 14px;
      color: #666;
      margin-top: 6px;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      width: 100%;
      max-width: 560px;
      margin-bottom: 52px;
    }

    .card {
      background: #fff;
      border: 1px solid #e8e8e4;
      border-radius: 10px;
      padding: 28px 24px 24px;
    }

    .card-label {
      font-size: 12px;
      font-weight: 500;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 10px;
    }

    .card-value {
      font-size: 42px;
      font-weight: 600;
      letter-spacing: -0.03em;
      line-height: 1;
      color: #111;
    }

    .card-note {
      font-size: 12px;
      color: #aaa;
      margin-top: 8px;
    }

    .chart-section {
      width: 100%;
      max-width: 560px;
      margin-bottom: 40px;
    }

    .chart-section h2 {
      font-size: 13px;
      font-weight: 500;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 16px;
    }

    .chart-placeholder {
      background: #fff;
      border: 1px solid #e8e8e4;
      border-radius: 10px;
      height: 160px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #bbb;
      font-size: 13px;
    }

    footer {
      font-size: 12px;
      color: #aaa;
      text-align: center;
    }

    footer a { color: #aaa; text-decoration: none; }
    footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <header>
    <a href="https://dvquys.com">← dvquys.com</a>
    <h1>Dashboard</h1>
    <p class="subtitle">Blog analytics</p>
  </header>

  <div class="cards">
    <div class="card">
      <div class="card-label">Visitors</div>
      <div class="card-value">191</div>
      <div class="card-note">Last 30 days</div>
    </div>
    <div class="card">
      <div class="card-label">Reactions</div>
      <div class="card-value">32</div>
      <div class="card-note">All time, across all posts</div>
    </div>
  </div>

  <div class="chart-section">
    <h2>Trend</h2>
    <div class="chart-placeholder">
      Historical data coming soon
    </div>
  </div>

  <footer>
    Updated 2026-04-05 03:00 UTC &nbsp;·&nbsp;
    <a href="https://github.com/dvquy13/dvquy13.github.io">Source</a>
  </footer>
</body>
</html>
